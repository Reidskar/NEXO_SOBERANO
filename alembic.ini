# alembic.ini — NEXO SOBERANO
# Ubicación: raíz del proyecto (junto a docker-compose.yml)
#
# IMPORTANTE: la sqlalchemy.url real se inyecta desde DATABASE_URL
# en alembic/env.py — el valor de abajo es solo un placeholder
# para que Alembic no falle al leer el .ini.

[alembic]
script_location = alembic

# Formato de nombre de archivo de revisión: fecha_hora_slug
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

# Timezone para timestamps de creación de revisiones
timezone = America/Santiago

truncate_slug_length = 40

# Placeholder — sobreescrito en env.py con la variable de entorno DATABASE_URL
sqlalchemy.url = driver://user:pass@localhost/dbname

output_encoding = utf-8

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
