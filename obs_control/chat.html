<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexo - Chat Inteligente Omnicanal</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f1115 0%, #1a1f2b 100%);
  color: #fff;
  height: 100vh;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-columns: 300px 1fr;
  height: 100vh;
}

.sidebar {
  background: #0a0e14;
  border-right: 1px solid #222;
  overflow-y: auto;
  padding: 20px;
}

.main {
  display: flex;
  flex-direction: column;
}

.chat-header {
  background: #1a1f2b;
  border-bottom: 1px solid #222;
  padding: 15px 25px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.chat-area {
  flex: 1;
  overflow-y: auto;
  padding: 25px;
  display: flex;
  flex-direction: column-reverse;
}

.message {
  margin: 15px 0;
  display: flex;
  animation: slideIn 0.3s ease;
}

@keyframes slideIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  justify-content: flex-end;
}

.message-bubble {
  max-width: 70%;
  padding: 12px 16px;
  border-radius: 12px;
  word-wrap: break-word;
}

.message.user .message-bubble {
  background: #00a8e8;
  border-bottom-right-radius: 4px;
}

.message.assistant .message-bubble {
  background: #2d3646;
  border-bottom-left-radius: 4px;
}

.message-meta {
  font-size: 0.75rem;
  color: #999;
  margin-top: 4px;
}

.input-area {
  background: #1a1f2b;
  border-top: 1px solid #222;
  padding: 15px 25px;
  display: flex;
  gap: 10px;
}

.input-area input {
  flex: 1;
  background: #2d3646;
  border: 1px solid #404854;
  color: #fff;
  padding: 10px 15px;
  border-radius: 8px;
  font-size: 1rem;
}

.input-area input:focus {
  outline: none;
  border-color: #00a8e8;
}

.input-area button {
  background: #00a8e8;
  color: #fff;
  border: none;
  padding: 10px 25px;
  border-radius: 8px;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

.input-area button:hover {
  background: #0088bb;
}

.sidebar-section {
  margin-bottom: 25px;
}

.sidebar-section h3 {
  font-size: 0.85rem;
  color: #999;
  text-transform: uppercase;
  margin-bottom: 10px;
}

.sidebar-btn {
  width: 100%;
  background: #2d3646;
  color: #fff;
  border: none;
  padding: 10px 15px;
  border-radius: 6px;
  margin-bottom: 8px;
  cursor: pointer;
  text-align: left;
  transition: 0.3s;
}

.sidebar-btn:hover {
  background: #404854;
}

.sidebar-btn.active {
  background: #00a8e8;
}

.status-badge {
  display: inline-block;
  background: #4caf50;
  color: #fff;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.75rem;
  margin: 5px 0;
}

.model-select {
  display: flex;
  gap: 5px;
  margin: 10px 0;
}

.model-select button {
  flex: 1;
  padding: 8px;
  border: 1px solid #404854;
  background: transparent;
  color: #fff;
  border-radius: 4px;
  cursor: pointer;
  font-size: 0.85rem;
}

.model-select button.active {
  background: #00a8e8;
  border-color: #00a8e8;
}

.context-panel {
  background: #2d3646;
  padding: 15px;
  border-radius: 8px;
  margin: 10px 0;
  font-size: 0.85rem;
  max-height: 200px;
  overflow-y: auto;
}

.context-panel h4 {
  color: #00a8e8;
  margin-bottom: 8px;
}

.context-item {
  color: #aaa;
  margin: 5px 0;
}

.typing-indicator {
  display: flex;
  gap: 4px;
  margin: 10px 0;
}

.typing-indicator span {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #00a8e8;
  animation: bounce 1.4s infinite;
}

.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
  0%, 80%, 100% { opacity: 0.3; }
  40% { opacity: 1; }
}
</style>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-main: #0a0a0f !important;
    --bg-sec: #111118 !important;
    --accent: #6c63ff !important;
    --accent-2: #00d4ff !important;
  }
  body, .dashboard, .main-content {
    background-color: var(--bg-main) !important;
    font-family: 'Inter', sans-serif !important;
  }
  .card, .feat-card, .sys-panel {
    background: rgba(255, 255, 255, 0.05) !important;
    backdrop-filter: blur(10px) !important;
    -webkit-backdrop-filter: blur(10px) !important;
    border: 1px solid rgba(0,212,255,0.1) !important;
  }
  h1, h2, h3, .brand {
    font-family: 'Inter', sans-serif !important;
  }
  pre, code, .terminal {
    font-family: 'JetBrains Mono', monospace !important;
  }
</style>
</head>

<body>

<div class="container">
  <!-- SIDEBAR -->
  <div class="sidebar">
    <h2 style="margin-bottom:20px;">Nexo AI</h2>
    
    <div class="sidebar-section">
      <h3>Modelos</h3>
      <div class="model-select">
        <button data-model="openai" class="active">Copilot</button>
        <button data-model="gemini">Gemini</button>
        <button data-model="auto">Auto</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Canales</h3>
      <button class="sidebar-btn active" data-action="send-telegram">📱 Telegram</button>
      <button class="sidebar-btn" data-action="send-whatsapp">💬 WhatsApp</button>
      <button class="sidebar-btn" data-action="send-facebook">👥 Facebook</button>
      <button class="sidebar-btn" data-action="send-instagram">📷 Instagram</button>
    </div>

    <div class="sidebar-section">
      <h3>Acciones</h3>
      <button class="sidebar-btn" data-action="guardar-diario">📔 Guardar en Diario</button>
      <button class="sidebar-btn" data-action="leer-diario">📖 Leer Diario</button>
      <button class="sidebar-btn" data-action="historial">⏱️ Mi Historial</button>
      <button class="sidebar-btn" data-action="clear">🗑️ Borrar Chat</button>
    </div>

    <div class="sidebar-section">
      <h3>Estado</h3>
      <div class="status-badge">✓ Conectado</div>
    </div>
  </div>

  <!-- MAIN -->
  <div class="main">
    <div class="chat-header">
      <div>
        <h3>Chat Inteligente</h3>
        <span id="current-provider" style="font-size:0.85rem;color:#999;">Proveedor: Auto</span>
      </div>
      <div id="context-summary" style="font-size:0.85rem;color:#999;"></div>
    </div>

    <div class="chat-area" id="chat">
      <div style="text-align:center;color:#666;margin-top:50px;">
        <h3>Bienvenido a Nexo</h3>
        <p style="margin-top:10px;">Comienza a escribir para iniciar la conversación inteligente.</p>
      </div>
    </div>

    <div class="input-area">
      <input
        type="text"
        id="message-input"
        placeholder="Escribe tu pregunta o comando aquí..."
        autocomplete="off"
      />
      <button onclick="sendMessage()">Enviar</button>
    </div>
  </div>
</div>

<script>
const API_URL = "http://localhost:8000/chat";
const USER_ID = "web_" + Math.random().toString(36).substr(2, 9);
let currentProvider = "auto";
let selectedChannel = null;

// Inicializar
document.addEventListener("DOMContentLoaded", () => {
  loadContext();
  document.getElementById("message-input").focus();
});

// ENVIAR MENSAJE
function sendMessage() {
  const input = document.getElementById("message-input");
  const text = input.value.trim();
  if (!text) return;

  addMessageToChat("user", text);
  input.value = "";

  // mostrar indicador de escritura
  setTyping(true);

  fetch(`${API_URL}/send`, {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ user_id: USER_ID, text: text, provider: currentProvider })
  })
  .then(r => r.json())
  .then(data => {
    setTyping(false);
    addMessageToChat("assistant", data.response, {
      model: data.model_used,
      intent: data.intent
    });
    updateContext();
  })
  .catch(err => {
    setTyping(false);
    addMessageToChat("assistant", "❌ Error: " + err.message);
  });
}

function addMessageToChat(role, content, meta = {}) {
  const chatDiv = document.getElementById("chat");
  const msgDiv = document.createElement("div");
  msgDiv.className = `message ${role}`;

  let modelText = "";
  if (meta.model) {
    modelText = ` • ${meta.model}`;
  }

  msgDiv.innerHTML = `
    <div class="message-bubble">${escapeHtml(content)}</div>
    <div class="message-meta">${new Date().toLocaleTimeString()}${modelText}</div>
  `;

  chatDiv.appendChild(msgDiv);
  chatDiv.scrollTop = 0;
}

function setTyping(show) {
  let typingDiv = document.getElementById("typing");
  if (show && !typingDiv) {
    const chatDiv = document.getElementById("chat");
    typingDiv = document.createElement("div");
    typingDiv.id = "typing";
    typingDiv.className = "typing-indicator";
    typingDiv.innerHTML = "<span></span><span></span><span></span>";
    chatDiv.appendChild(typingDiv);
  } else if (!show && typingDiv) {
    typingDiv.remove();
  }
}

// MODELO SELECTOR
document.querySelectorAll(".model-select button").forEach(btn => {
  btn.addEventListener("click", (e) => {
    document.querySelectorAll(".model-select button").forEach(b => b.classList.remove("active"));
    e.target.classList.add("active");
    currentProvider = e.target.dataset.model;
    document.getElementById("current-provider").textContent = `Proveedor: ${currentProvider}`;
  });
});

// ACCIONES SIDEBAR
document.querySelectorAll(".sidebar-btn").forEach(btn => {
  btn.addEventListener("click", async (e) => {
    const action = e.target.dataset.action;
    if (action === "send-telegram" || action === "send-whatsapp" || action === "send-facebook" || action === "send-instagram") {
      selectedChannel = action.split("-")[1];
      document.querySelectorAll(".sidebar-btn").forEach(b => b.classList.remove("active"));
      e.target.classList.add("active");
      addMessageToChat("system", `Canal seleccionado: ${selectedChannel}`);
    }
    else if (action === "guardar-diario") {
      addMessageToChat("system", "Respuestas futuras se guardarán en el diario automáticamente.");
    }
    else if (action === "leer-diario") {
      fetch(`${API_URL}/history/${USER_ID}?limit=50`)
        .then(r => r.json())
        .then(data => {
          let summary = "📖 Últimas entradas del diario:\n";
          data.history.slice(0, 5).forEach(m => {
            summary += `\n[${m.role}]: ${m.content.substring(0, 50)}...`;
          });
          addMessageToChat("system", summary);
        });
    }
    else if (action === "historial") {
      loadContext();
    }
    else if (action === "clear") {
      document.getElementById("chat").innerHTML = `
        <div style="text-align:center;color:#666;margin-top:50px;">
          <h3>Chat borrado</h3>
          <p>Conversación local limpiada.</p>
        </div>
      `;
    }
  });
});

// CONTEXT
function loadContext() {
  fetch(`${API_URL}/context/${USER_ID}`)
    .then(r => r.json())
    .then(data => {
      const ctx = data.context;
      let ctxHtml = "";
      if (ctx.last_topic) ctxHtml += `<div class="context-item">📌 Tema: ${ctx.last_topic}</div>`;
      document.getElementById("context-summary").innerHTML = ctxHtml;
    });
}

function updateContext() {
  loadContext();
}

function escapeHtml(text) {
  const div = document.createElement("div");
  div.textContent = text;
  return div.innerHTML;
}

// ENTER para enviar
document.getElementById("message-input").addEventListener("keypress", (e) => {
  if (e.key === "Enter") sendMessage();
});
</script>

</body>
</html>
