<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Nexo Admin Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: linear-gradient(135deg, #0f1115 0%, #1a1f2b 100%);
  color: #fff;
}

.login-container {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
}

.login-box {
  background: #1a1f2b;
  padding: 40px;
  border-radius: 12px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.3);
  width: 100%;
  max-width: 400px;
}

.login-box h1 {
  margin-bottom: 30px;
  font-size: 2rem;
  color: #00a8e8;
}

.form-group {
  margin-bottom: 20px;
}

.form-group label {
  display: block;
  margin-bottom: 8px;
  color: #aaa;
  font-size: 0.9rem;
}

.form-group input {
  width: 100%;
  padding: 12px;
  background: #2d3646;
  border: 1px solid #404854;
  color: #fff;
  border-radius: 6px;
  font-size: 1rem;
}

.form-group input:focus {
  outline: none;
  border-color: #00a8e8;
}

.btn {
  width: 100%;
  padding: 12px;
  background: #00a8e8;
  color: #fff;
  border: none;
  border-radius: 6px;
  font-size: 1rem;
  font-weight: bold;
  cursor: pointer;
  transition: 0.3s;
}

.btn:hover {
  background: #0088bb;
}

.error {
  background: #ff4444;
  padding: 12px;
  border-radius: 6px;
  margin-bottom: 20px;
  display: none;
}

.dashboard {
  display: none;
  background: #0f1115;
  min-height: 100vh;
  padding: 20px;
}

.navbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1a1f2b;
  padding: 15px 25px;
  border-radius: 12px;
  margin-bottom: 25px;
}

.navbar h2 { color: #00a8e8; }

.navbar button {
  background: #d9534f;
  border: none;
  color: #fff;
  padding: 8px 15px;
  border-radius: 6px;
  cursor: pointer;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
  margin-bottom: 30px;
}

.card {
  background: #1a1f2b;
  padding: 20px;
  border-radius: 12px;
  border-left: 4px solid #00a8e8;
}

.card h3 { color: #00a8e8; margin-bottom: 10px; }
.card-value { font-size: 2rem; font-weight: bold; margin: 10px 0; }
.card-meta { color: #999; font-size: 0.9rem; }

.table-container {
  background: #1a1f2b;
  border-radius: 12px;
  padding: 20px;
  overflow-x: auto;
}

.table-container table {
  width: 100%;
  border-collapse: collapse;
}

.table-container th, .table-container td {
  padding: 12px;
  text-align: left;
  border-bottom: 1px solid #2d3646;
}

.table-container th {
  background: #2d3646;
  color: #00a8e8;
  font-weight: bold;
}

.table-container tr:hover {
  background: #2d3646;
}

.status-badge {
  display: inline-block;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 0.85rem;
  font-weight: bold;
}

.status-active { background: #4caf50; }
.status-inactive { background: #f44336; }

.modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  align-items: center;
  justify-content: center;
  z-index: 1000;
}

.modal.show { display: flex; }

.modal-content {
  background: #1a1f2b;
  padding: 30px;
  border-radius: 12px;
  width: 100%;
  max-width: 400px;
}

.modal-content h2 { margin-bottom: 20px; color: #00a8e8; }

.close-modal {
  float: right;
  font-size: 1.5rem;
  cursor: pointer;
  color: #999;
}
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-container" id="login-view">
  <div class="login-box">
    <h1>Nexo Admin</h1>
    <div class="error" id="login-error"></div>
    <form onsubmit="login(event)">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="username" required />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="password" required />
      </div>
      <button class="btn" type="submit">Ingresar</button>
    </form>
  </div>
</div>

<!-- DASHBOARD -->
<div class="dashboard" id="dashboard-view">
  <div class="navbar">
    <h2>Nexo Admin Dashboard</h2>
    <button onclick="logout()">Cerrar sesión</button>
  </div>

  <div class="grid">
    <div class="card">
      <h3>Usuarios activos</h3>
      <div class="card-value" id="active-users">-</div>
      <div class="card-meta">Registrados en el sistema</div>
    </div>
    <div class="card">
      <h3>Mensajes procesados</h3>
      <div class="card-value" id="total-messages">-</div>
      <div class="card-meta">Todos los canales</div>
    </div>
    <div class="card">
      <h3>Tokens gastados</h3>
      <div class="card-value" id="tokens-spent">-</div>
      <div class="card-meta">Aproximado USD</div>
    </div>
    <div class="card">
      <h3>Uptime</h3>
      <div class="card-value" id="uptime">-</div>
      <div class="card-meta">Días online</div>
    </div>
  </div>

  <div class="table-container">
    <h3 style="margin-bottom: 15px;">Usuarios</h3>
    <table id="users-table">
      <thead>
        <tr>
          <th>Usuario</th>
          <th>Email</th>
          <th>Rol</th>
          <th>Estado</th>
          <th>Creado</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
  <div class="modal-content">
    <span class="close-modal" onclick="closeModal()">&times;</span>
    <h2>Crear usuario</h2>
    <form onsubmit="createUser(event)">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" id="new-username" required />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="new-email" required />
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="new-password" required />
      </div>
      <button class="btn" type="submit">Crear</button>
    </form>
  </div>
</div>

<script>
const API_URL = window.location.origin;
let token = localStorage.getItem("auth_token");

// Check if logged in
if (token) {
  showDashboard();
  loadStats();
} else {
  showLogin();
}

function showLogin() {
  document.getElementById("login-view").style.display = "flex";
  document.getElementById("dashboard-view").style.display = "none";
}

function showDashboard() {
  document.getElementById("login-view").style.display = "none";
  document.getElementById("dashboard-view").style.display = "block";
}

async function login(e) {
  e.preventDefault();
  const username = document.getElementById("username").value;
  const password = document.getElementById("password").value;

  try {
    const res = await fetch(`${API_URL}/auth/login`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password })
    });
    const data = await res.json();

    if (res.ok) {
      token = data.access_token;
      localStorage.setItem("auth_token", token);
      showDashboard();
      loadStats();
    } else {
      document.getElementById("login-error").style.display = "block";
      document.getElementById("login-error").textContent = "Credenciales inválidas";
    }
  } catch (err) {
    console.error(err);
    document.getElementById("login-error").style.display = "block";
    document.getElementById("login-error").textContent = "No se pudo conectar al backend. Verifica que esté activo.";
  }
}

function logout() {
  localStorage.removeItem("auth_token");
  token = null;
  showLogin();
}

async function loadStats() {
  // Simular stats (en producción consultar endpoints reales)
  document.getElementById("active-users").textContent = "42";
  document.getElementById("total-messages").textContent = "1,234";
  document.getElementById("tokens-spent").textContent = "$5.67";
  document.getElementById("uptime").textContent = "15 días";

  // Cargar usuarios
  try {
    // Este endpoint es solo para mostrar menú admin
    const res = await fetch(`${API_URL}/admin/users`, {
      headers: { "Authorization": `Bearer ${token}` }
    });
    if (res.ok) {
      const data = await res.json();
      populateUsersTable(data.users);
    }
  } catch (err) {
    console.log("Endpoint admin no disponible aún");
  }
}

function populateUsersTable(users) {
  const tbody = document.querySelector("#users-table tbody");
  tbody.innerHTML = users.map(u => `
    <tr>
      <td>${u.username}</td>
      <td>${u.email}</td>
      <td>${u.role}</td>
      <td><span class="status-badge ${u.is_active ? 'status-active' : 'status-inactive'}">${u.is_active ? 'Activo' : 'Inactivo'}</span></td>
      <td>${new Date(u.created_at).toLocaleDateString()}</td>
    </tr>
  `).join("");
}

function closeModal() {
  document.getElementById("modal").classList.remove("show");
}

async function createUser(e) {
  e.preventDefault();
  const username = document.getElementById("new-username").value;
  const email = document.getElementById("new-email").value;
  const password = document.getElementById("new-password").value;

  try {
    const res = await fetch(`${API_URL}/auth/register`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, email, password })
    });

    if (res.ok) {
      closeModal();
      loadStats();
    }
  } catch (err) {
    console.error(err);
  }
}
</script>

</body>
</html>
