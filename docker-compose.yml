version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.nexo_core
    container_name: nexo-backend
    ports:
      - "8000:8000"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - XAI_API_KEY=${XAI_API_KEY}
      - NEXO_API_KEY=${NEXO_API_KEY}
      - SECRET_KEY=${SECRET_KEY}
      - NEXO_HOST=0.0.0.0
      - NEXO_PORT=8000
      - NEXO_LOG_LEVEL=${NEXO_LOG_LEVEL:-INFO}
      - NEXO_MAX_TOKENS_DIA=${NEXO_MAX_TOKENS_DIA:-900000}
      - NEXO_CORS_ORIGINS=${NEXO_CORS_ORIGINS}
      - NEXO_LLM_PROVIDER=${NEXO_LLM_PROVIDER:-auto}
      - DISCORD_WEBHOOK_URL=${DISCORD_WEBHOOK_URL}
      - NEXO_ALERT_WEBHOOK=${NEXO_ALERT_WEBHOOK}
      - DISCORD_ENABLED=${DISCORD_ENABLED:-false}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - DRIVE_ROOT_FOLDER_ID=${DRIVE_ROOT_FOLDER_ID}
      - YOUTUBE_CHANNEL_ID=${YOUTUBE_CHANNEL_ID}
      - OBS_ENABLED=${OBS_ENABLED:-false}
      - OBS_HOST=${OBS_HOST:-localhost}
      - OBS_PORT=${OBS_PORT:-4455}
      - OBS_PASSWORD=${OBS_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER}
      - SMTP_FROM=${SMTP_FROM}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - DATABASE_URL=postgresql://nexo_user:nexo_password@postgres:5432/nexo_db
      - ENVIRONMENT=production
    volumes:
      - ./:/app
      - nexo-data:/app/NEXO_SOBERANO/base_sqlite
      - nexo-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  nginx:
    image: nginx:alpine
    container_name: nexo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nexo-logs:/var/log/nginx
    depends_on:
      - backend
    restart: always

  postgres:
    image: postgres:15-alpine
    container_name: nexo-postgres
    environment:
      POSTGRES_USER: nexo_user
      POSTGRES_PASSWORD: nexo_password
      POSTGRES_DB: nexo_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo_user -d nexo_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  discord-bot:
    build:
      context: ./discord_bot
      dockerfile: Dockerfile.discord_bot
    container_name: nexo-discord-bot
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - DISCORD_GUILD_ID=${DISCORD_GUILD_ID}
      - FASTAPI_URL=http://backend:8000
      - NEXO_API_KEY=${NEXO_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}
      - VOICE_ALWAYS_ON=${VOICE_ALWAYS_ON:-true}
      - VOICE_GUILD_ID=${VOICE_GUILD_ID}
      - VOICE_CHANNEL_ID=${VOICE_CHANNEL_ID}
    volumes:
      - ./discord_bot:/app
      - /app/node_modules
    depends_on:
      - backend
    restart: always

  webhook-relay:
    build:
      context: ./monitoring/webhook_relay
    container_name: nexo-webhook-relay
    environment:
      - PORT=4000
      - TARGET_SLACK_WEBHOOK=${TARGET_SLACK_WEBHOOK}
      - TARGET_DISCORD_WEBHOOK=${TARGET_DISCORD_WEBHOOK}
      - PAGERDUTY_KEY=${PAGERDUTY_KEY}
      - ALERT_DEDUP_WINDOW=300
      - MAX_RETRIES=5
    restart: always

volumes:
  nexo-data:
  nexo-logs:
  postgres-data:

networks:
  default:
    name: nexo-network
