version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.nexo_core
    container_name: nexo-backend
    profiles: ["prod", "dev"]
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DATABASE_URL=${DATABASE_URL}
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./:/app
      - nexo-data:/app/data
      - nexo-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: node:18-alpine
    container_name: nexo-frontend
    working_dir: /app
    ports:
      - "8080:3000"
    volumes:
      - ./obs_control:/app
    command: python -m http.server 8080
    restart: always

  nexo_db:
    image: postgres:15-alpine
    container_name: nexo_db
    profiles: ["prod", "dev"]
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-nexo}
      POSTGRES_USER: ${POSTGRES_USER:-nexo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - nexo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexo"]
      interval: 10s
      timeout: 5s
      retries: 5

  nexo_redis:
    image: redis:7-alpine
    container_name: nexo_redis
    profiles: ["prod", "dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  nexo_qdrant:
    image: qdrant/qdrant:latest
    container_name: nexo_qdrant
    profiles: ["prod", "dev"]
    restart: unless-stopped
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - nexo-qdrant:/qdrant/storage

volumes:
  nexo-data:
  nexo-logs:
  nexo-pgdata:
  nexo-qdrant:
