version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.nexo_core
    container_name: nexo-backend
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - TELEGRAM_TOKEN=${TELEGRAM_TOKEN}
      - DATABASE_URL=sqlite:////app/data/nexo.db
      - ENVIRONMENT=production
      - SECRET_KEY=${SECRET_KEY}
    volumes:
      - ./:/app
      - nexo-data:/app/data
      - nexo-logs:/app/logs
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: node:18-alpine
    container_name: nexo-frontend
    working_dir: /app
    ports:
      - "8080:3000"
    volumes:
      - ./obs_control:/app
    command: python -m http.server 8080
    restart: always

  nginx:
    image: nginx:alpine
    container_name: nexo-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
      - nexo-logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    restart: always

volumes:
  nexo-data:
  nexo-logs:

networks:
  default:
    name: nexo-network
