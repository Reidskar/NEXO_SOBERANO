[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile.nexo_core"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3

[deploy.variables]
NEXO_MODE = "cloud"
